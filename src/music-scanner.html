<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Music Scanner</title>
    <link rel="stylesheet" href="./styles/theme.css" />
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(135deg, var(--bg) 0%, color-mix(in srgb, var(--surface) 82%, #000 18%) 100%);
        color: var(--text);
        font-family: Inter, system-ui, -apple-system, Segoe UI, Arial, sans-serif;
        overflow: hidden;
      }

      .wrap {
        height: 100%;
        display: flex;
        flex-direction: column;
        padding: 14px;
        gap: 12px;
        box-sizing: border-box;
      }

      .top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }

      .title {
        font-weight: 800;
        letter-spacing: 0.02em;
      }

      .meta {
        font-size: 12px;
        color: var(--text-muted);
        margin-top: 4px;
      }

      .btn {
        border: 1px solid var(--border);
        background: color-mix(in srgb, var(--surface-soft) 86%, transparent 14%);
        color: var(--text);
        border-radius: var(--radius-pill);
        padding: 8px 10px;
        cursor: pointer;
        font-weight: 800;
        transition: transform 0.2s ease, border-color 0.2s ease;
      }
      .btn:hover {
        transform: translateY(-2px);
        border-color: color-mix(in srgb, var(--accent) 70%, white 30%);
      }

      .content {
        overflow: auto;
        padding-right: 4px;
      }

      .folder {
        border: 1px solid var(--border);
        background: color-mix(in srgb, var(--surface) 84%, transparent 16%);
        border-radius: var(--radius-card);
        backdrop-filter: blur(10px);
        padding: 10px 10px;
        margin-bottom: 12px;
      }

      .folder-title {
        font-weight: 800;
        opacity: 0.9;
        margin-bottom: 8px;
      }

      .track-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        padding: 8px 8px;
        border-radius: var(--radius-card);
        border: 1px solid rgba(255, 255, 255, 0.06);
        background: color-mix(in srgb, var(--surface-soft) 84%, transparent 16%);
        margin-bottom: 8px;
      }

      .track-title {
        font-weight: 650;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .plus-btn {
        border: 1px solid color-mix(in srgb, var(--accent) 70%, white 30%);
        background: rgba(45, 212, 191, 0.14);
        color: var(--accent);
        border-radius: var(--radius-pill);
        padding: 6px 10px;
        cursor: pointer;
        font-weight: 900;
        transition: transform 0.2s ease, border-color 0.2s ease;
      }
      .plus-btn:hover {
        transform: translateY(-2px);
      }

      .empty {
        opacity: 0.7;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="top">
        <div>
          <div class="title">СКАНЕР МУЗЫКИ</div>
          <div class="meta" id="metaText">Загрузка…</div>
        </div>
        <button class="btn" id="btnClose" type="button">✕</button>
      </div>
      <div class="content" id="content"></div>
    </div>

    <script src="./music-scanner.js"></script>
  </body>
</html>
