<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Music Scanner</title>
    <style>
      :root {
        --bg: #0a0a0f;
        --surface: #14141f;
        --surface-2: #1e1e2a;
        --border: rgba(255, 255, 255, 0.12);
        --text: #ededee;
        --text-muted: rgba(237, 237, 238, 0.68);
        --accent: #3b82f6;
        --danger: #ef4444;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: var(--bg);
        color: var(--text);
        font-family: Inter, system-ui, -apple-system, Segoe UI, Arial, sans-serif;
        overflow: hidden;
      }

      .wrap {
        height: 100%;
        display: flex;
        flex-direction: column;
        padding: 14px;
        gap: 12px;
        box-sizing: border-box;
      }

      .top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }

      .title {
        font-weight: 800;
        letter-spacing: 0.02em;
      }

      .meta {
        font-size: 12px;
        color: var(--text-muted);
        margin-top: 4px;
      }

      .btn {
        border: 1px solid var(--border);
        background: var(--surface-2);
        color: var(--text);
        border-radius: 12px;
        padding: 8px 10px;
        cursor: pointer;
        font-weight: 800;
      }

      .content {
        overflow: auto;
        padding-right: 4px;
      }

      .folder {
        border: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.03);
        border-radius: 14px;
        padding: 10px 10px;
        margin-bottom: 12px;
      }

      .folder-title {
        font-weight: 800;
        opacity: 0.9;
        margin-bottom: 8px;
      }

      .track-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        padding: 8px 8px;
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.06);
        background: rgba(0, 0, 0, 0.12);
        margin-bottom: 8px;
      }

      .track-title {
        font-weight: 650;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .plus-btn {
        border: 1px solid rgba(59, 130, 246, 0.4);
        background: rgba(59, 130, 246, 0.12);
        color: #93c5fd;
        border-radius: 12px;
        padding: 6px 10px;
        cursor: pointer;
        font-weight: 900;
      }

      .empty {
        opacity: 0.7;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="top">
        <div>
          <div class="title">СКАНЕР МУЗЫКИ</div>
          <div class="meta" id="metaText">Загрузка…</div>
        </div>
        <button class="btn" id="btnClose" type="button">✕</button>
      </div>
      <div class="content" id="content"></div>
    </div>

    <script src="./music-scanner.js"></script>
  </body>
</html>
