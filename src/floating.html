<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Connor</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: transparent;
        overflow: hidden;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Arial, sans-serif;
      }

      .floating-card {
        width: 280px;
        height: 90px;
        box-sizing: border-box;
        background: rgba(20, 20, 35, 0.62);
        backdrop-filter: blur(12px) saturate(110%);
        border-radius: 24px;
        border: 1px solid rgba(45, 212, 191, 0.24);
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.32);
        padding: 10px 12px;
        color: #e2e8f0;
      }

      .drag-area {
        -webkit-app-region: drag;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }

      .status-left {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .avatar-c {
        width: 36px;
        height: 36px;
        border-radius: 999px;
        border: 1px solid rgba(45, 212, 191, 0.38);
        background: rgba(45, 212, 191, 0.1);
        display: grid;
        place-items: center;
        color: #2dd4bf;
        font-family: "SF Mono", ui-monospace, Menlo, Consolas, monospace;
        font-size: 22px;
        line-height: 1;
        font-weight: 500;
      }

      .status-dot {
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: rgba(148, 163, 184, 0.8);
      }

      .status-dot.on {
        background: #2dd4bf;
      }

      .status-text {
        font-size: 12px;
        font-weight: 600;
        color: rgba(226, 232, 240, 0.92);
      }

      .transcript {
        margin-top: 8px;
        font-size: 12px;
        color: rgba(226, 232, 240, 0.75);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .command {
        margin-top: 4px;
        font-size: 11px;
        color: rgba(45, 212, 191, 0.95);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
    </style>
  </head>
  <body>
    <div class="floating-card" id="floatingCard">
      <div class="drag-area">
        <div class="status-left">
          <div class="avatar-c" aria-hidden="true">C</div>
          <div class="status-dot" id="statusDot"></div>
          <span class="status-text" id="statusText">Ожидание</span>
        </div>
        <span style="font-size: 11px; opacity: 0.65; user-select: none;">Connor</span>
      </div>

      <div class="transcript" id="transcript">—</div>
      <div class="command" id="commandPreview"></div>
    </div>

    <script>
      const statusDot = document.getElementById('statusDot');
      const statusText = document.getElementById('statusText');
      const transcriptEl = document.getElementById('transcript');
      const commandPreview = document.getElementById('commandPreview');

      let commandTimeout = null;

      function setListening(listening) {
        const on = !!listening;
        if (statusDot) statusDot.classList.toggle('on', on);
        if (statusText) statusText.textContent = on ? 'Слушаю' : 'Ожидание';
      }

      function setTranscript(text) {
        if (!transcriptEl) return;
        const t = typeof text === 'string' ? text.trim() : '';
        transcriptEl.textContent = t ? t : '—';
      }

      window.api?.onVoiceStatus?.((data) => {
        try {
          setListening(!!data?.listening);
          setTranscript(data?.transcript);
        } catch {}
      });

      window.api?.onVoiceCommand?.((data) => {
        try {
          const cmd = String(data?.command || '').trim();
          const result = typeof data?.result === 'string' ? data.result.trim() : '';
          if (!cmd && !result) return;
          const shown = result ? result : cmd;
          if (commandPreview) commandPreview.textContent = shown;
          if (commandTimeout) clearTimeout(commandTimeout);
          commandTimeout = setTimeout(() => {
            try {
              if (commandPreview) commandPreview.textContent = '';
            } catch {}
          }, 3000);
        } catch {}
      });

      setListening(false);
      setTranscript('—');
      if (commandPreview) commandPreview.textContent = '';
    </script>
  </body>
</html>
