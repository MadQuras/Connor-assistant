<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Connor</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" />
    <link rel="stylesheet" href="./styles/theme.css" />
    <link rel="stylesheet" href="./floating.css" />
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: transparent;
        overflow: hidden;
        font-family: Inter, system-ui, -apple-system, 'Segoe UI', Arial, sans-serif;
      }
    </style>
  </head>
  <body>
    <div class="floating-card" id="floatingCard">
      <div class="drag-area">
        <div class="status-left">
          <div class="avatar-c" aria-hidden="true">C</div>
          <div class="status-dot" id="statusDot"></div>
          <span class="status-text" id="statusText">Ожидание</span>
        </div>
        <span style="font-size: 11px; opacity: 0.65; user-select: none">Connor</span>
      </div>

      <div class="transcript" id="transcript">—</div>

      <div class="mic-volume" aria-label="Уровень микрофона">
        <i class="fas fa-microphone-alt" aria-hidden="true"></i>
        <div class="mic-volume-track">
          <div class="volume-bar" id="micVolumeBar"></div>
        </div>
      </div>
    </div>

    <script src="./floating.js"></script>
  </body>
</html>
