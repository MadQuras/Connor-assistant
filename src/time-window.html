<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Время</title>
    <style>
      html,
      body {
        margin: 0;
        background: #050510;
        color: #e9f2ff;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      }
      .root {
        min-height: 100vh;
        display: grid;
        place-items: center;
      }
      .time {
        font-size: 72px;
        font-weight: 900;
        letter-spacing: 0.03em;
      }
    </style>
  </head>
  <body>
    <div class="root">
      <div id="timeText" class="time">--:--:--</div>
    </div>
    <script>
      const timeText = document.getElementById('timeText');
      function tick() {
        timeText.textContent = new Date().toLocaleTimeString('ru-RU', {
          hour: '2-digit',
          minute: '2-digit',
          second: '2-digit',
        });
      }
      tick();
      setInterval(tick, 1000);
      window.api?.onTimeUpdate?.((data) => {
        if (data?.now) timeText.textContent = String(data.now);
      });
    </script>
  </body>
  </html>
