<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Подтверждение</title>
    <link rel="stylesheet" href="./styles/theme.css" />
    <style>
      body {
        background: linear-gradient(135deg, var(--bg) 0%, color-mix(in srgb, var(--surface) 82%, #000 18%) 100%);
        backdrop-filter: blur(12px);
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        margin: 0;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      }
      .confirm-card {
        background: color-mix(in srgb, var(--surface) 84%, transparent 16%);
        border: 1px solid var(--border);
        border-radius: var(--radius-card);
        backdrop-filter: blur(12px);
        box-shadow: 0 6px 18px rgba(0, 0, 0, 0.2);
        padding: 28px 32px;
        width: 300px;
        text-align: center;
      }
      .message { color: var(--text); margin-bottom: 24px; font-size: 16px; }
      .buttons { display: flex; gap: 12px; justify-content: center; }
      button {
        padding: 8px 24px;
        border-radius: var(--radius-pill);
        border: 1px solid var(--border);
        cursor: pointer;
        font-weight: 600;
        transition: transform 0.2s ease, border-color 0.2s ease;
      }
      button:hover { transform: translateY(-2px); }
      .confirm { background: var(--accent); color: var(--bg); }
      .cancel { background: color-mix(in srgb, var(--surface-soft) 86%, transparent 14%); color: var(--text); }
    </style>
  </head>
  <body>
    <div class="confirm-card">
      <div class="message" id="message">Подтвердите действие</div>
      <div class="buttons">
        <button class="confirm" id="confirm" type="button">Да</button>
        <button class="cancel" id="cancel" type="button">Нет</button>
      </div>
    </div>
    <script>
      const api = window.api || null;
      document.getElementById('confirm').onclick = () => {
        const key = new URLSearchParams(location.search).get('actionKey') || '';
        api?.systemConfirmAction?.(key);
      };
      document.getElementById('cancel').onclick = () => {
        api?.systemCancelPending?.();
      };
      if (api?.onSystemConfirmState) {
        api.onSystemConfirmState((data) => {
          document.getElementById('message').textContent = data?.message || 'Подтвердите действие';
        });
      }
    </script>
  </body>
  </html>
