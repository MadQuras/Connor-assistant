<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Connor Notes Overlay</title>
    <link rel="stylesheet" href="../../styles/theme.css" />
    <style>
      html, body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: transparent;
        overflow: hidden;
        font-family: Inter, system-ui, -apple-system, 'Segoe UI', Arial, sans-serif;
      }
      .card {
        box-sizing: border-box;
        width: 100%;
        height: 100%;
        border: 1px solid color-mix(in srgb, var(--accent) 28%, transparent);
        border-radius: 16px;
        background: color-mix(in srgb, var(--surface) 86%, transparent);
        backdrop-filter: blur(12px);
        display: flex;
        flex-direction: column;
        padding: 10px;
        color: var(--text);
      }
      .drag {
        -webkit-app-region: drag;
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 8px;
        font-size: 12px;
        opacity: 0.9;
      }
      .controls button {
        -webkit-app-region: no-drag;
        cursor: pointer;
      }
      .status {
        font-size: 12px;
        margin-bottom: 8px;
        color: var(--text-muted);
      }
      .current {
        min-height: 54px;
        max-height: 90px;
        overflow-y: auto;
        padding: 8px;
        border-radius: 10px;
        background: rgba(0, 0, 0, 0.22);
        border: 1px solid var(--border);
        font-size: 12px;
        margin-bottom: 8px;
      }
      .list {
        flex: 1;
        overflow-y: auto;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: rgba(0, 0, 0, 0.2);
        padding: 6px;
      }
      .item {
        font-size: 12px;
        padding: 7px 8px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      }
      .item:last-child {
        border-bottom: 0;
      }
      .actions {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 6px;
        margin-top: 8px;
      }
      .btn {
        border: 1px solid var(--border);
        background: color-mix(in srgb, var(--accent) 14%, transparent);
        color: var(--text);
        border-radius: 999px;
        padding: 7px 8px;
        font-size: 11px;
      }
      .btn:hover { border-color: color-mix(in srgb, var(--accent) 45%, transparent); }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="drag">
        <strong>Конспекты</strong>
        <div class="controls">
          <button class="btn" id="hideBtn" type="button">Скрыть</button>
        </div>
      </div>
      <div class="status" id="recordingStatus">Статус: не записываю</div>
      <div class="current" id="currentText">—</div>
      <div class="list" id="todayList"></div>
      <div class="actions">
        <button class="btn" id="startBtn" type="button">Начать</button>
        <button class="btn" id="stopBtn" type="button">Остановить</button>
        <button class="btn" id="saveBtn" type="button">Сохранить</button>
      </div>
    </div>
    <script src="./overlay.js"></script>
  </body>
</html>
